#   obs_norm_path: /home/stud367/rl_project/hockey_project/results/TQC/hockey/2026-02-18_00-00-15_user_seed45/checkpoints/TQC__hoi7w4x7__phase5_league_psro_externals__tot70000__seed45__late__ep59999.npz
#   warmup_steps: 30000

episodes: 30000
phases:
- name: phase1_shooting
  until_episode: 1000
  env_mode: TRAIN_SHOOTING
  step_count: 80
  reward_overrides:
    touch_bonus: 0.7
    puck_direction_weight: 0.2
    shot_bonus: 0.05
  noise: 1.0
  opponent_mix:
    strong: 0.75
    weak: 0.25

- name: phase1_defense
  until_episode: 2000
  env_mode: TRAIN_DEFENSE
  step_count: 80
  noise: 1.0
  opponent_mix:
    strong: 0.75
    weak: 0.25
    
- name: phase2_bots_anchor
  until_episode: 5000
  env_mode: NORMAL
  step_count: 300
  noise: 1.0
  reward_overrides:
    opp_touch_weight: 0.4
  opponent_mix:
    weak: 0.15
    strong: 0.85
    self_play: 0.0
    external: 0.0

- name: phase3_league_pfsp_mid
  until_episode: 9000
  env_mode: NORMAL
  step_count: 300
  noise: 1.0
  reward_overrides:
    use_potential_shaping: true
    progress_weight: 0.5
    opp_touch_weight: 0.5
  opponent_mix:
    self_play: 0.4
    weak: 0.18
    strong: 0.37
    external: 0.05
  self_play_sampling: pfsp_mid

- name: phase3_league_ucb_cover
  until_episode: 12000
  env_mode: NORMAL
  step_count: 300
  noise: 1.0
  reward_overrides:
    use_potential_shaping: true
    progress_weight: 0.5
    opp_touch_weight: 0.6
  opponent_mix:
    self_play: 0.45
    weak: 0.1
    strong: 0.35
    external: 0.08
  external_pool:
    sampling: pfsp_mid
    pfsp_target: 0.75
    pfsp_temperature: 0.2
  self_play_sampling: ucb

- name: phase4_league_pfsp_mid
  until_episode: 15000
  env_mode: NORMAL
  step_count: 250
  noise: 1.0
  reward_overrides:
    use_potential_shaping: true
    progress_weight: 0.5
    opp_touch_weight: 0.6
    closeness_weight: 1.2
  opponent_mix:
    self_play: 0.4
    external: 0.12
    weak: 0.1
    strong: 0.3
  external_pool:
    pfsp_target: 0.75
    pfsp_temperature: 0.2
  self_play_sampling: pfsp_mid

- name: phase4_league_ucb_cover
  until_episode: 18000
  env_mode: NORMAL
  step_count: 250
  noise: 1.0
  reward_overrides:
    use_potential_shaping: true
    progress_weight: 0.5
    opp_touch_weight: 0.6
    closeness_weight: 1.3
  opponent_mix:
    self_play: 0.4
    external: 0.2
    weak: 0.05
    strong: 0.3
  external_pool:
    sampling: pfsp_mid

  self_play_sampling: ucb
- name: phase5_league_psro
  until_episode: 21000
  env_mode: NORMAL
  step_count: 250
  noise: 1.0
  reward_overrides:
    use_potential_shaping: true
    progress_weight: 0.4
    opp_touch_weight: 0.4
  opponent_mix:
    self_play: 0.4
    external: 0.25
    weak: 0.05
    strong: 0.3

  self_play_sampling: meta
- name: phase5_league_psro_externals
  until_episode: 24000
  env_mode: NORMAL
  step_count: 250
  noise: 1.0
  reward_overrides:
    use_potential_shaping: true
    progress_weight: 0.4
    opp_touch_weight: 0.5
  opponent_mix:
    self_play: 0.35
    external: 0.35
    weak: 0.0
    strong: 0.3
  self_play_sampling: meta

- name: phase6_polish_deterministic
  until_episode: 27000
  env_mode: NORMAL
  step_count: 250
  noise: 0.0
  reward_overrides:
    use_potential_shaping: true
    progress_weight: 0.4
    opp_touch_weight: 0.6
  opponent_mix:
    self_play: 0.4
    external: 0.35
    weak: 0.0
    strong: 0.25
  external_pool:
    sampling: ucb
  self_play_sampling: meta

- name: phase6_polish_deterministicv2
  until_episode: 30000
  env_mode: NORMAL
  step_count: 250
  noise: 0.0
  reward_overrides:
    use_potential_shaping: true
    progress_weight: 0.4
    opp_touch_weight: 0.7
  opponent_mix:
    self_play: 0.4
    external: 0.4
    weak: 0.0
    strong: 0.2
  self_play_sampling: meta
