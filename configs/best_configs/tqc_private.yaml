algo: TQC
env: hockey
user: user
seed: 45
step_count: 250
action_dim: 4
gamma: 0.99
tau: 0.005
noise: 1.0
lr: 0.0002
batch_size: 256
buffer_size: 1000000
window_size: 100
warmup_steps: 20000
updates_per_step: 1
checkpoint_interval_episodes: 200
tqc:
  n_critics: 5
  n_quantiles: 25
  top_quantiles_to_drop: 2
  alpha: auto
  init_alpha: 0.2
  actor_lr: 0.0002
  critic_lr: 0.0002
  target_entropy: null
obs_norm:
  enabled: true
  clip: 5.0
  update: true
symmetry:
  enabled: true
  mode: flip_y
  prob: 0.5
opponent_mix:
  weak: 0.35
  strong: 0.35
  self_play: 0.3
self_play:
  enabled: true
  snapshot_start_episode: 4500
  snapshot_interval_episodes: 200
  max_pool_size: 20
  elite_size: 5
  sample_uniform_prob: 0.1
  ucb_beta: 0.5
  deterministic_opponent: true
  sampling: pfsp_mid
  pfsp_power: 1.0
  pfsp_target: 0.5
  pfsp_temperature: 0.15
  discount_stats: true
  discount_factor: 0.997
  
curriculum:
  enabled: true
  self_play_ramp_episodes: 2000

psro:
  enabled: true
  start_episode: 5500
  update_interval_episodes: 600
  max_league_size: 6
  games_per_match: 3
  replicator_iters: 200
  replicator_lr: 2.0
  uniform_prob: 0.1
  step_count: 250


external_pool:

  external_agents: true

  enabled: true
  results_root: results
  env_name: hockey
  score_threshold: 0.86
  algos: ["SAC", "TD3", "TQC"]  
  include_segments: ["best", "mid", "late"]  
  max_models: 500
  max_per_run: 10
  require_norm: true
  sampling: pfsp_mid
  pfsp_power: 1.0
  pfsp_target: 0.5
  pfsp_temperature: 0.15
  sample_uniform_prob: 0.1
  ucb_beta: 0.5
  discount_stats: true
  discount_factor: 0.995
  start_episode: 9000
  ramp_episodes: 10000
  deterministic_opponent: true
  follow_self_play_sampling: true
  min_models: 20
  max_pool_size: 1000

  # leaderboard_csv_path: "/home/stud367/rl_project/hockey_project/internal_leaderboard/leaderboards/leaderboard_2026-02-22_08-53-09_g1eh8c62.csv"
  # skip_bottom_n: 250

reward:

  terminal_win_reward: 10.0
  terminal_loss_penalty: 10.0
  terminal_tie_reward: 0.0

  closeness_weight: 1.0
  touch_bonus: 0.5
  opp_touch_weight: 0.0
  use_potential_shaping: false
  progress_weight: 0.0
  puck_direction_weight: 0.1
  shot_bonus: 0.0
  shot_gate_x: 0.0
  shot_gate_vx: 0.0
  shot_gate_abs_y: 1.5
  action_l2_weight: 0.0005

  danger:
    enabled: true
    weight: 0.00
    x_threshold: 3.0
    vx_threshold: -0.7

  speed:
    enabled: true
    to_puck_weight: 0.035
    accel_weight: 0.0
    danger_only: true

eval:
  enabled: true
  interval_episodes: 200
  episodes_per_opponent: 50
  opponents:
  - weak
  - strong
  - self_play
wandb_project: RL-hockey-V3
