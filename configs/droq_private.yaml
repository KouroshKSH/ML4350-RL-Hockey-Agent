algo: "DROQ"
env: "hockey"
user: "user"
seed: 10

# Total training budget
episodes: 20000
step_count: 250
action_dim: 4

gamma: 0.99
tau: 0.005

# For DROQ: noise > 0 => stochastic rollouts, noise == 0 => deterministic rollouts.
noise: 1.0

lr: 0.0003
batch_size: 256
buffer_size: 1000000
window_size: 100

warmup_steps: 20000
updates_per_step: 4

checkpoint_interval_episodes: 200

droq:
  alpha: "auto"
  init_alpha: 0.2
  actor_lr: 0.0003
  critic_lr: 0.0003
  actor_hidden_dim: 256
  critic_hidden_dim: 256
  n_critics: 2
  target_subset: 2
  dropout_p: 0.01
  target_entropy: null

obs_norm:
  enabled: true
  clip: 5.0
  update: true

symmetry:
  enabled: true
  mode: "flip_y"
  prob: 0.5

opponent_mix:
  weak: 0.35
  strong: 0.35
  self_play: 0.30

self_play:
  enabled: true
  snapshot_start_episode: 5000
  snapshot_interval_episodes: 800
  max_pool_size: 20
  elite_size: 5
  sample_uniform_prob: 0.10
  ucb_beta: 0.50
  deterministic_opponent: true
  sampling: "pfsp_mid"
  pfsp_power: 1.0
  pfsp_target: 0.5
  pfsp_temperature: 0.15
  discount_stats: true
  discount_factor: 0.997

curriculum:
  enabled: true
  self_play_ramp_episodes: 3000

psro:
  enabled: true
  start_episode: 6000
  update_interval_episodes: 800
  max_league_size: 6
  games_per_match: 3
  replicator_iters: 200
  replicator_lr: 2.0
  uniform_prob: 0.10
  step_count: 250

reward:
  terminal_win_reward: 10.0
  closeness_weight: 0.25
  touch_bonus: 1.0

  use_potential_shaping: true
  progress_weight: 2.0

  # additional options that would help but we might need to be careful about (kept low by default)
  opp_touch_weight: 0.0
  puck_direction_weight: 0.0
  shot_bonus: 0.0
  shot_gate_x: 0.0
  shot_gate_vx: 0.0
  shot_gate_abs_y: 1.5

  action_l2_weight: 0.0003
  danger:
    enabled: false
    weight: 0.05
    x_threshold: -10.0
    vx_threshold: -0.1

eval:
  enabled: true
  interval_episodes: 200
  episodes_per_opponent: 50
  opponents: ["weak", "strong", "self_play"]

wandb_project: "RL-hockey"

phases:
  - name: phase1_shooting
    until_episode: 600
    env_mode: TRAIN_SHOOTING
    step_count: 80
    noise: 1.0
    opponent_mix:
      strong: 1.0

  - name: phase1_defense
    until_episode: 1200
    env_mode: TRAIN_DEFENSE
    step_count: 80
    noise: 1.0
    opponent_mix:
      strong: 1.0

  - name: phase2_bots_anchor
    until_episode: 5000
    env_mode: NORMAL
    step_count: 250
    noise: 1.0
    opponent_mix:
      weak: 0.25
      strong: 0.75

  - name: phase3_league_pfsp_mid
    until_episode: 9500
    env_mode: NORMAL
    step_count: 300
    noise: 1.0
    opponent_mix:
      self_play: 0.4
      weak: 0.2
      strong: 0.4
    self_play_sampling: pfsp_mid

  - name: phase3_league_ucb_cover
    until_episode: 12500
    env_mode: NORMAL
    step_count: 300
    noise: 1.0
    opponent_mix:
      self_play: 0.5
      weak: 0.15
      strong: 0.35
    self_play_sampling: ucb

  - name: phase4_league_psro
    until_episode: 19000
    env_mode: NORMAL
    step_count: 350
    noise: 1.0
    opponent_mix:
      self_play: 0.6
      weak: 0.1
      strong: 0.3
    self_play_sampling: meta

  - name: phase5_polish_deterministic
    until_episode: 20000
    env_mode: NORMAL
    step_count: 350
    noise: 0.0
    opponent_mix:
      self_play: 0.6
      weak: 0.1
      strong: 0.3
    self_play_sampling: meta
