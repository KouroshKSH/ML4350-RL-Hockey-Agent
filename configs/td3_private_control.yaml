algo: "TD3"
env: "hockey"
user: "user"
seed: 10

# Total training budget
episodes: 25000
step_count: 250
action_dim: 4

gamma: 0.99
tau: 0.005

lr: 0.0003
batch_size: 256
buffer_size: 1000000
window_size: 100

warmup_steps: 20000
updates_per_step: 1
checkpoint_interval_episodes: 200

# Default exploration noise scale. in TD3, this is an amplitude. This is different form other YAML files
noise: 0.12

exploration:
  type: "pink"
  pink_rows: 16
  reset_each_episode: true

td3:
  policy_noise: 0.2
  noise_clip: 0.5
  policy_delay: 2

obs_norm:
  enabled: true
  clip: 5.0
  update: true

symmetry:
  enabled: true
  mode: "flip_y"
  prob: 0.5

opponent_mix:
  weak: 0.35
  strong: 0.35
  self_play: 0.30

self_play:
  enabled: true
  snapshot_start_episode: 5000
  snapshot_interval_episodes: 800
  max_pool_size: 30
  elite_size: 5
  sample_uniform_prob: 0.10
  ucb_beta: 0.50
  deterministic_opponent: true
  sampling: "pfsp_mid"
  pfsp_power: 1.0
  pfsp_target: 0.5
  pfsp_temperature: 0.15
  discount_stats: true
  discount_factor: 0.997

curriculum:
  enabled: true
  self_play_ramp_episodes: 3500

psro:
  enabled: true
  start_episode: 6500
  update_interval_episodes: 800
  max_league_size: 6
  games_per_match: 3
  replicator_iters: 200
  replicator_lr: 2.0
  uniform_prob: 0.10
  step_count: 350

reward:
  # Minimal + stable defaults (kept fixed across phases to avoid off-policy replay issues)
  terminal_win_reward: 10.0
  closeness_weight: 0.25
  touch_bonus: 1.0
  # controls opponent-touch shaping. Keep it low.
  opp_touch_weight: 0.5
  # Potential-based progress shaping on puck x
  use_potential_shaping: true
  progress_weight: 2.0
  # velocity proxy (kept small if potential shaping is on)
  puck_direction_weight: 0.2

  # additional options that would help but we might need to be careful about (kept low by default)
  shot_bonus: 0.0
  shot_gate_x: 0.0
  shot_gate_vx: 0.0
  shot_gate_abs_y: 1.5

  action_l2_weight: 0.0003

  danger:
    enabled: false
    weight: 0.05
    x_threshold: -2.5
    vx_threshold: -0.1

eval:
  enabled: true
  interval_episodes: 200
  episodes_per_opponent: 50
  opponents: ["weak", "strong", "self_play"]

wandb_project: "RL-hockey"

phases:
  - name: phase1_shooting
    until_episode: 600
    env_mode: TRAIN_SHOOTING
    step_count: 80
    noise: 0.18
    opponent_mix:
      strong: 1.0

  - name: phase1_defense
    until_episode: 1200
    env_mode: TRAIN_DEFENSE
    step_count: 80
    noise: 0.15
    opponent_mix:
      strong: 1.0

  - name: phase2_bots_anchor
    until_episode: 5000
    env_mode: NORMAL
    step_count: 300
    noise: 0.12
    opponent_mix:
      weak: 0.25
      strong: 0.75

  - name: phase3_league_pfsp_mid
    until_episode: 11500
    env_mode: NORMAL
    step_count: 300
    noise: 0.10
    reward_overrides:
      use_potential_shaping: true
      progress_weight: 0.3
      opp_touch_weight: 0.4  # Assuming the code treats this as a possession-denial reward
      touch_bonus: 0.8
    opponent_mix:
      self_play: 0.40
      weak: 0.20
      strong: 0.40
    self_play_sampling: pfsp_mid

  - name: phase3_league_ucb_cover
    until_episode: 15500
    env_mode: NORMAL
    step_count: 300
    noise: 0.09
    reward_overrides:
      use_potential_shaping: true
      progress_weight: 0.3
      opp_touch_weight: 0.4  # Assuming the code treats this as a possession-denial reward
      touch_bonus: 0.8
    opponent_mix:
      self_play: 0.50
      weak: 0.15
      strong: 0.35
    self_play_sampling: ucb

  - name: phase4_league_psro
    until_episode: 24000
    env_mode: NORMAL
    step_count: 350
    noise: 0.08
    reward_overrides:
      use_potential_shaping: true
      progress_weight: 0.3
      opp_touch_weight: 0.4  # Assuming the code treats this as a possession-denial reward
      touch_bonus: 0.8
    opponent_mix:
      self_play: 0.60
      weak: 0.10
      strong: 0.30
    self_play_sampling: meta

  - name: phase5_polish_deterministic
    until_episode: 25000
    env_mode: NORMAL
    step_count: 350
    noise: 0.0
    reward_overrides:
      use_potential_shaping: true
      progress_weight: 0.3
      opp_touch_weight: 0.4  # Assuming the code treats this as a possession-denial reward
      touch_bonus: 0.8
    opponent_mix:
      self_play: 0.60
      weak: 0.10
      strong: 0.30
    self_play_sampling: meta
